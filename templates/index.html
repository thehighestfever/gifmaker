<!DOCTYPE html>
<html>
<head>
    <title>Rewind GIF Maker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #000;
            color: #e6e6e6;
            font-size: 1.3rem;
        }

        .page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .left {
            flex: 1;
            padding: 28px;
        }

        h2 { font-size: 2.2rem; margin-bottom: 16px; }
        h3 { font-size: 1.7rem; margin-top: 28px; margin-bottom: 12px; }

        input, button {
            padding: 18px;
            margin: 14px 0;
            border: 1px solid #555;
            background: #111;
            color: #fff;
            width: 100%;
            box-sizing: border-box;
            border-radius: 8px;
            font-size: 1.3rem;
        }

        button { font-size: 1.5rem; font-weight: bold; }
        button:hover { background: #222; }

        #browser {
            border: 1px solid #444;
            background: #111;
            height: 340px;
            overflow-y: auto;
            padding: 14px;
            margin-top: 12px;
            border-radius: 8px;
        }

        .item {
            padding: 14px 8px;
            cursor: pointer;
            border-bottom: 1px solid #222;
            font-size: 1.3rem;
        }

        .item:hover { background: #222; }
        .folder { font-weight: bold; }

        .gif-thumb {
            max-width: 100%;
            max-height: 260px;
            display: block;
            margin: 16px 0;
            border: 1px solid #444;
            border-radius: 8px;
        }

        .time-row {
            display: flex;
            gap: 18px;
            align-items: center;
            margin-bottom: 10px;
        }

        .gif-gallery {
            padding: 28px;
            border-top: 1px solid #333;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gif-item {
            margin-bottom: 26px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .delete-btn {
            background: #661111;
            border: 1px solid #aa3333;
            padding: 14px;
            border-radius: 6px;
            font-size: 1.2rem;
            width: 50%;
            display: block;
            margin: 12px auto 0 auto;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="page">

    <div class="left">
        <h2>Rewind GIF Maker</h2>

        <form method="POST" enctype="multipart/form-data">

            <h3>Upload a Video</h3>
            <input type="file" name="video">

            <h3>YouTube URL</h3>
            <input type="text" name="youtube"
                   value="{{ last_youtube }}"
                   placeholder="https://www.youtube.com/watch?v=...">

            <h3>Or Select a Host Video</h3>
            <input type="text" name="hostpath" id="hostpath"
                   value="{{ last_hostpath }}"
                   placeholder="/videos/...">

            <div id="browser">Loading videos...</div>

            <h3>Segments</h3>

            <div id="segments">
                <div class="time-row">
                    <label>Start:</label>
                    <input type="text" name="start[]" placeholder="00:00:00" required>

                    <label>End:</label>
                    <input type="text" name="end[]" placeholder="00:00:00" required>
                </div>
            </div>

            <button type="button" id="addSegmentBtn">Add Segment</button>

            <button type="submit">Generate GIF</button>
        </form>

        {% if gif_path %}
            <h3>Latest GIF</h3>
            <img src="{{ gif_path }}" class="gif-thumb">
            <p><a href="{{ gif_path }}" download>Download latest GIF</a></p>
        {% endif %}
    </div>

    <div class="gif-gallery">
        <h3>Generated GIFs</h3>

        <button id="deleteAllBtn" class="delete-btn" style="width:60%;">
            Delete All GIFs
        </button>

        <div id="gifPanel">Loading GIFs...</div>
    </div>

</div>

<script>
let segmentCount = 1;

document.getElementById("addSegmentBtn").onclick = () => {
    const container = document.getElementById("segments");

    const row = document.createElement("div");
    row.className = "time-row";
    row.innerHTML = `
        <label>Start ${segmentCount + 1}:</label>
        <input type="text" name="start[]" placeholder="00:00:00">

        <label>End ${segmentCount + 1}:</label>
        <input type="text" name="end[]" placeholder="00:00:00">
    `;

    container.appendChild(row);
    segmentCount++;
};

async function loadDir(path = "") {
    const res = await fetch("/listdir?path=" + encodeURIComponent(path));
    const data = await res.json();

    const browser = document.getElementById("browser");
    browser.innerHTML = "";

    if (data.path) {
        const up = data.path.split("/").slice(0, -1).join("/");
        const upDiv = document.createElement("div");
        upDiv.textContent = "[..]";
        upDiv.className = "item folder";
        upDiv.onclick = () => loadDir(up);
        browser.appendChild(upDiv);
    }

    data.dirs.forEach(dir => {
        const div = document.createElement("div");
        div.textContent = dir + "/";
        div.className = "item folder";
        div.onclick = () => loadDir(data.path ? data.path + "/" + dir : dir);
        browser.appendChild(div);
    });

    data.files.forEach(file => {
        const div = document.createElement("div");
        div.textContent = file;
        div.className = "item";
        div.onclick = () => {
            const fullPath = data.path ? "/videos/" + data.path + "/" + file : "/videos/" + file;
            document.getElementById("hostpath").value = fullPath;
        };
        browser.appendChild(div);
    });
}

async function loadGifs() {
    const res = await fetch("/listgifs");
    const gifs = await res.json();

    const panel = document.getElementById("gifPanel");
    panel.innerHTML = "";

    if (!gifs.length) {
        panel.textContent = "(no GIFs yet)";
        return;
    }

    gifs.forEach(name => {
        const wrapper = document.createElement("div");
        wrapper.className = "gif-item";

        const img = document.createElement("img");
        img.src = "/gif/" + encodeURIComponent(name);
        img.className = "gif-thumb";

        const link = document.createElement("a");
        link.href = "/gif/" + encodeURIComponent(name);
        link.textContent = name;
        link.target = "_blank";

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.className = "delete-btn";
        delBtn.onclick = async () => {
            await fetch("/delete_gif", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ filename: name })
            });
            loadGifs();
        };

        wrapper.appendChild(img);
        wrapper.appendChild(link);
        wrapper.appendChild(delBtn);
        panel.appendChild(wrapper);
    });
}

document.getElementById("deleteAllBtn").onclick = async () => {
    await fetch("/delete_all_gifs", { method: "POST" });
    loadGifs();
};

window.onload = () => {
    loadDir("");
    loadGifs();
};
</script>

</body>
</html>
