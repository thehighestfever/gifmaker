<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REWIND GIF/MP4 TOOL</title>
    <br>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            padding: 20px 0;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: auto;
        }

        .panel {
            background: #222;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .col {
            flex: 1;
        }

        input, select, button {
            padding: 6px;
            margin: 4px 0;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: #eee;
        }

        button {
            cursor: pointer;
            background: #444;
        }

        button:hover {
            background: #555;
        }

        #browser .item {
            padding: 4px;
            cursor: pointer;
        }

        #browser .folder {
            color: #6cf;
        }

        #browser .item:hover {
            background: #333;
        }

        .segment {
            background: #333;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .gif-item {
            background: #333;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .thumb {
            max-width: 400px;
            display: block;
            margin-bottom: 6px;
        }

        .delete-btn {
            background: #933;
        }

        .delete-btn:hover {
            background: #b44;
        }

        .stitch-select {
            transform: scale(1.3);
        }
    </style>
</head>

<body>
    <h1>REWIND</h1>

    <div class="container">

        <!-- ================================
             FILE BROWSER
        ================================= -->
        <div class="panel">
            <h2>File Browser</h2>
            <div id="browser">(loading...)</div>
        </div>

        <!-- ================================
             GENERATION FORM
        ================================= -->
        <div class="panel">
            <h2>Create Clip</h2>

            <form id="genForm" method="POST" enctype="multipart/form-data">

                <label>Host Path:</label>
                <input type="text" id="hostpath" name="hostpath" value="{{ last_hostpath }}" style="width:100%;">

                <label>Upload File:</label>
                <input type="file" name="video">

                <label>Format:</label>
                <select name="format">
                    <option value="gif" {% if last_format == "gif" %}selected{% endif %}>GIF</option>
                    <option value="mp4" {% if last_format == "mp4" %}selected{% endif %}>MP4</option>
                </select>

                <h3>Segments</h3>
                <div id="segments">
                    <div class="segment">
                        <label>Start:</label>
                        <input type="text" name="start[]" value="{{ last_start }}" placeholder="00:00:00" required>

                        <label>End:</label>
                        <input type="text" name="end[]" value="{{ last_end }}" placeholder="00:00:00" required>

                        <div>
                            <label>Adjust:</label>
                            <select name="start_sign[]">
                                <option value="+">+</option>
                                <option value="-">-</option>
                            </select>
                            <input type="number" name="start_frames[]" value="0" min="0">
                            <span>frames</span>

                            <label>Adjust:</label>
                            <select name="end_sign[]">
                                <option value="+">+</option>
                                <option value="-">-</option>
                            </select>
                            <input type="number" name="end_frames[]" value="0" min="0">
                            <span>frames</span>
                        </div>
                    </div>
                </div>

                <button type="button" id="addSegmentBtn">Add Segment</button>
                <br><br>
                <button type="submit">Generate</button>
            </form>
        </div>

        <!-- ================================
             OUTPUT MEDIA PANEL
        ================================= -->
        <div class="panel">
            <h2>Generated Media</h2>
            <button id="deleteAllMediaBtn">Delete All</button>
            <button id="stitchBtn">Stitch Selected</button>
            <div id="gifPanel">(loading...)</div>
        </div>

    </div>

<!-- ================================
     JAVASCRIPT
================================= -->
<script>
let selectionOrder = [];

/* ------------------------------
   ADD SEGMENT
------------------------------ */
document.getElementById("addSegmentBtn").onclick = () => {
    const container = document.getElementById("segments");
    const div = document.createElement("div");
    div.className = "segment";
    div.innerHTML = `
        <label>Start:</label>
        <input type="text" name="start[]" placeholder="00:00:00" required>

        <label>End:</label>
        <input type="text" name="end[]" placeholder="00:00:00" required>

        <div>
            <label>Adjust:</label>
            <select name="start_sign[]">
                <option value="+">+</option>
                <option value="-">-</option>
            </select>
            <input type="number" name="start_frames[]" value="0" min="0">
            <span>frames</span>

            <label>Adjust:</label>
            <select name="end_sign[]">
                <option value="+">+</option>
                <option value="-">-</option>
            </select>
            <input type="number" name="end_frames[]" value="0" min="0">
            <span>frames</span>
        </div>
    `;
    container.appendChild(div);
};

/* ------------------------------
   FILE BROWSER
------------------------------ */
async function loadDir(path = "") {
    const res = await fetch("/listdir?path=" + encodeURIComponent(path));
    const data = await res.json();

    const browser = document.getElementById("browser");
    browser.innerHTML = "";

    if (data.path) {
        const up = data.path.split("/").slice(0, -1).join("/");
        const upDiv = document.createElement("div");
        upDiv.textContent = "[..]";
        upDiv.className = "item folder";
        upDiv.onclick = () => loadDir(up);
        browser.appendChild(upDiv);
    }

    data.dirs.forEach(dir => {
        const div = document.createElement("div");
        div.textContent = dir + "/";
        div.className = "item folder";
        div.onclick = () => loadDir(data.path ? data.path + "/" + dir : dir);
        browser.appendChild(div);
    });

    data.files.forEach(file => {
        const div = document.createElement("div");
        div.textContent = file;
        div.className = "item";

        div.onclick = () => {
            const fullPath = data.path ? "/videos/" + data.path + "/" + file : "/videos/" + file;
            document.getElementById("hostpath").value = fullPath;
        };

        browser.appendChild(div);
    });
}

/* ------------------------------
   MEDIA LIST
------------------------------ */
async function loadMedia() {
    const res = await fetch("/listmedia");
    const items = await res.json();

    const panel = document.getElementById("gifPanel");
    panel.innerHTML = "";
    selectionOrder = [];

    if (!items.length) {
        panel.textContent = "(no outputs yet)";
        return;
    }

    items.forEach(name => {
        const wrapper = document.createElement("div");
        wrapper.className = "gif-item";

        let mediaEl;
        if (name.toLowerCase().endsWith(".mp4")) {
            mediaEl = document.createElement("video");
            mediaEl.src = "/media/" + encodeURIComponent(name);
            mediaEl.className = "thumb";
            mediaEl.controls = true;
            mediaEl.loop = true;
            mediaEl.muted = true;
        } else {
            mediaEl = document.createElement("img");
            mediaEl.src = "/media/" + encodeURIComponent(name);
            mediaEl.className = "thumb";
        }

        const link = document.createElement("a");
        link.href = "/media/" + encodeURIComponent(name);
        link.textContent = name;
        link.target = "_blank";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "stitch-select";
        checkbox.value = name;
        checkbox.onclick = () => toggleSelection(name, checkbox);

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.className = "delete-btn";
        delBtn.onclick = async () => {
            await fetch("/delete_media", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ filename: name })
            });
            loadMedia();
        };

        wrapper.appendChild(mediaEl);
        wrapper.appendChild(link);
        wrapper.appendChild(checkbox);
        wrapper.appendChild(delBtn);

        panel.appendChild(wrapper);
    });
}

/* ------------------------------
   SELECTION ORDER FOR STITCHING
------------------------------ */
function toggleSelection(name, checkbox) {
    if (checkbox.checked) {
        selectionOrder.push(name);
    } else {
        selectionOrder = selectionOrder.filter(n => n !== name);
    }
}

/* ------------------------------
   STITCH SELECTED
------------------------------ */
document.getElementById("stitchBtn").onclick = async () => {
    if (selectionOrder.length < 2) {
        alert("Select at least two items to stitch.");
        return;
    }

    const res = await fetch("/stitch_existing", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ files: selectionOrder })
    });

    const out = await res.json();

    if (out.output) {
        loadMedia();
        alert("Stitched successfully!");
    } else {
        alert("Stitch failed.");
    }
};

/* ------------------------------
   DELETE ALL MEDIA
------------------------------ */
document.getElementById("deleteAllMediaBtn").onclick = async () => {
    await fetch("/delete_all_media", { method: "POST" });
    loadMedia();
};

/* ------------------------------
   INITIAL LOAD
------------------------------ */
window.onload = () => {
    loadDir("");
    loadMedia();
};
</script>

</body>
</html>
